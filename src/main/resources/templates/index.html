<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="my-variations-section">
    <h4>Phân loại</h4>
    <div class="my-variations-section" >
        <div class="variation-grid" style="
  display: grid;                     /* bật grid */
  grid-template-columns: repeat(3, 1fr);  /* 3 cột bằng nhau */
  gap: 15px;                         /* khoảng cách giữa các ô */">
            <button class="btn btn-primary">Item 1</button>
            <button class="btn btn-primary">Item 2</button>
            <button class="btn btn-primary">Item 3</button>
            <button class="btn btn-primary">Item 4</button>
            <button class="btn btn-primary">Item 5</button>
            <button class="btn btn-primary">Item 6</button>
        </div>
        <div class="variation-options">
            <button *ngFor="let option of variation.optionInputs"
                    [class]="'variation-option ' + (selectedVariations[variation.sku] === option.optionName ? 'selected' : '')"
                    (click)="selectVariation(variation.sku, option.optionValue)">
                {{ option.optionName }}
            </button>
        </div>
    </div>
</div>
